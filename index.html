<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Senser Smart</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      get,
      remove
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // =========================
    // Firebase Config
    // =========================
    const firebaseConfig = {
      apiKey: "AIzaSyDhC4l21ocHOOxDMOnS8xaiia_z5Uf3JDA",
  authDomain: "dht11-dashboard-e92d3.firebaseapp.com",
  databaseURL: "https://dht11-dashboard-e92d3-default-rtdb.firebaseio.com",
  projectId: "dht11-dashboard-e92d3",
  storageBucket: "dht11-dashboard-e92d3.firebasestorage.app",
  messagingSenderId: "470269364821",
  appId: "1:470269364821:web:90e799523bcab0265ce2dc",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // =========================
    // ตัวแปรหลัก
    // =========================
    let chart;
    let allHistory = [];
    let realtimeEnabled = true;

    const tempEl = () => document.getElementById("temp");
    const humEl = () => document.getElementById("hum");
    const statusEl = () => document.getElementById("status");
    const statusMsgEl = () => document.getElementById("statusMessage");
    const updatedEl = () => document.getElementById("updated");
    const tableBody = () => document.getElementById("historyTableBody");
    const selectedDateEl = () => document.getElementById("selectedDate");

    // =========================
    // ฟังก์ชันเวลาไทย
    // =========================
    function formatThaiDateTime(ts) {
  if (!ts) return "-";
  const d = new Date(ts * 1000);

  return d.toLocaleString("th-TH", {
    timeZone: "Asia/Bangkok",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
}

    function formatThaiDate(ts) {
      const d = new Date(ts * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function getTodayStr() {
      const now = new Date();
      const thai = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Bangkok" }));
      const y = thai.getFullYear();
      const m = String(thai.getMonth() + 1).padStart(2, "0");
      const d = String(thai.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    // =========================
    // แปลงสถานะ
    // =========================
    function getStatusInfo(temp) {
      if (temp >= 28) {
        return {
          text: "แจ้งเตือน",
          message: "กรุณาเปิดแอร์สำรองด่วน",
          color: "#dc2626"
        };
      }
      return {
        text: "ปกติ",
        message: "อุณหภูมิปกติ",
        color: "#16a34a"
      };
    }

    // =========================
    // โหลดค่าปัจจุบันแบบ realtime
    // =========================
    function loadRealtimeSensor() {
      const sensorRef = ref(db, "sensor");
      onValue(sensorRef, (snapshot) => {
        if (!realtimeEnabled) return;

        const data = snapshot.val();
        if (!data) return;

        const temp = Number(data.temperature ?? 0);
        const hum = Number(data.humidity ?? 0);
        const updated = data.updated_at || null;

        const status = getStatusInfo(temp);

        tempEl().textContent = `${temp.toFixed(1)} °C`;
        humEl().textContent = `${hum.toFixed(0)} %`;
        statusEl().textContent = status.text;
        statusEl().style.color = status.color;
        statusMsgEl().textContent = status.message;
        updatedEl().textContent = formatThaiDateTime(updated);
      });
    }

    // =========================
    // โหลด history ทั้งหมด
    // =========================
    async function loadHistory() {
      const historyRef = ref(db, "history");
      const snapshot = await get(historyRef);

      if (!snapshot.exists()) {
        allHistory = [];
        renderBySelectedDate();
        return;
      }

      const raw = snapshot.val();
      const arr = Object.keys(raw).map(key => ({
        key,
        ...raw[key]
      }));

      // เรียงตามเวลาเก่า -> ใหม่
      arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
      allHistory = arr;

      renderBySelectedDate();
    }

    // =========================
    // กรองตามวันที่เลือก
    // =========================
    function getFilteredDataByDate(dateStr) {
      return allHistory.filter(item => {
        if (!item.timestamp) return false;
        return formatThaiDate(item.timestamp) === dateStr;
      });
    }

    // =========================
    // render ข้อมูลตามวันที่เลือก
    // =========================
    function renderBySelectedDate() {
      const selectedDate = selectedDateEl().value;
      const today = getTodayStr();

      const filtered = getFilteredDataByDate(selectedDate);

      // ถ้าเลือก "วันนี้" ให้ realtime ทำงาน
      realtimeEnabled = (selectedDate === today);

      if (filtered.length === 0) {
        tempEl().textContent = "-- °C";
        humEl().textContent = "-- %";
        statusEl().textContent = "ไม่มีข้อมูล";
        statusEl().style.color = "#6b7280";
        statusMsgEl().textContent = "-";
        updatedEl().textContent = "-";

        renderChart([]);
        renderTable([]);
        return;
      }

      const latest = filtered[filtered.length - 1];
      const latestTemp = Number(latest.temperature ?? 0);
      const latestHum = Number(latest.humidity ?? 0);
      const latestStatus = getStatusInfo(latestTemp);

      // ถ้าไม่ใช่วันนี้ ให้ใช้ค่าจากข้อมูลย้อนหลังล่าสุดของวันนั้น
      if (selectedDate !== today) {
        tempEl().textContent = `${latestTemp.toFixed(1)} °C`;
        humEl().textContent = `${latestHum.toFixed(0)} %`;
        statusEl().textContent = latestStatus.text;
        statusEl().style.color = latestStatus.color;
        statusMsgEl().textContent = latestStatus.message;
        updatedEl().textContent = formatThaiDateTime(latest.timestamp);
      }

      renderChart(filtered);
      renderTable(filtered);
    }

    // =========================
    // วาดกราฟ
    // =========================
    function renderChart(data) {
      const ctx = document.getElementById("historyChart").getContext("2d");

     const labels = data.map(item => {
  const d = new Date(item.timestamp * 1000);

  return d.toLocaleTimeString("th-TH", {
    timeZone: "Asia/Bangkok",
    hour: "2-digit",
    minute: "2-digit"
  });
});

      const temps = data.map(item => item.temperature ?? null);
      const hums = data.map(item => item.humidity ?? null);

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "อุณหภูมิ (°C)",
              data: temps,
              borderColor: "#ef4444",
              backgroundColor: "rgba(239,68,68,0.15)",
              tension: 0.3,
              fill: false,
              yAxisID: "y"
            },
            {
              label: "ความชื้น (%)",
              data: hums,
              borderColor: "#2563eb",
              backgroundColor: "rgba(37,99,235,0.15)",
              tension: 0.3,
              fill: false,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: "index",
            intersect: false
          },
          plugins: {
            legend: {
              position: "top"
            }
          },
          scales: {
            y: {
              type: "linear",
              position: "left",
              title: {
                display: true,
                text: "อุณหภูมิ (°C)"
              }
            },
            y1: {
              type: "linear",
              position: "right",
              grid: {
                drawOnChartArea: false
              },
              title: {
                display: true,
                text: "ความชื้น (%)"
              }
            }
          }
        }
      });
    }

    // =========================
    // ตารางย้อนหลัง
    // =========================
    function renderTable(data) {
      const body = tableBody();
      body.innerHTML = "";

      if (!data.length) {
        body.innerHTML = `
          <tr>
            <td colspan="4" style="text-align:center; color:#6b7280;">ไม่มีข้อมูลของวันที่เลือก</td>
          </tr>
        `;
        return;
      }

      // ให้แสดงล่าสุดอยู่บนสุด
      const reversed = [...data].reverse();

      reversed.forEach(item => {
        const temp = Number(item.temperature ?? 0);
        const status = getStatusInfo(temp);

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatThaiDateTime(item.timestamp)}</td>
          <td>${temp.toFixed(1)}</td>
          <td>${Number(item.humidity ?? 0).toFixed(0)}</td>
          <td style="color:${status.color}; font-weight:700;">${status.text}</td>
        `;
        body.appendChild(tr);
      });
    }

    // =========================
    // ล้างประวัติย้อนหลัง
    // =========================
    async function clearHistory() {
      const ok = confirm("ต้องการล้างข้อมูลย้อนหลังทั้งหมดใช่ไหม?");
      if (!ok) return;

      try {
        await remove(ref(db, "history"));
        alert("ล้างประวัติเรียบร้อย");
        allHistory = [];
        renderBySelectedDate();
      } catch (err) {
        console.error(err);
        alert("ล้างข้อมูลไม่สำเร็จ");
      }
    }

    // =========================
    // refresh
    // =========================
    async function refreshAll() {
      await loadHistory();
      alert("รีเฟรชข้อมูลแล้ว");
    }

    // =========================
    // start
    // =========================
    window.addEventListener("DOMContentLoaded", async () => {
      // ตั้งค่าวันเริ่มต้นเป็นวันนี้
      selectedDateEl().value = getTodayStr();

      document.getElementById("btnRefresh").addEventListener("click", refreshAll);
      document.getElementById("btnClear").addEventListener("click", clearHistory);
      document.getElementById("selectedDate").addEventListener("change", renderBySelectedDate);

      loadRealtimeSensor();
      await loadHistory();
       
              setInterval(loadHistory, 60000);
    });
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
      color: #111827;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .title {
      text-align: center;
      font-size: 44px;
      font-weight: 800;
      color: #1d4ed8;
      margin: 10px 0 24px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }

    .btn-blue { background: #2563eb; }
    .btn-red { background: #ef4444; }

    .date-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .date-box label {
      font-size: 16px;
      font-weight: 700;
    }

    .date-box input[type="date"] {
      padding: 10px 14px;
      border: 1px solid #dbe3f0;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      min-height: 140px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 18px;
    }

    .card-value {
      font-size: 44px;
      font-weight: 800;
      line-height: 1.1;
    }

    .status-main {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .status-sub {
      font-size: 15px;
      color: #4b5563;
    }

    .panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      padding: 22px;
      margin-bottom: 22px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .chart-wrap {
      height: 420px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
    }

    th {
      background: #f3f6fb;
      font-size: 15px;
    }

    tr:hover td {
      background: #fafcff;
    }

    @media (max-width: 1000px) {
      .cards {
        grid-template-columns: repeat(2, 1fr);
      }
      .title {
        font-size: 34px;
      }
    }

    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
      }
      .title {
        font-size: 28px;
      }
      .card-value {
        font-size: 36px;
      }
      .chart-wrap {
        height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">DHT11 Smart Dashboard</div>

    <div class="top-actions">
      <button id="btnRefresh" class="btn btn-blue">รีเฟรชหน้า</button>
      <button id="btnClear" class="btn btn-red">ล้างประวัติย้อนหลัง</button>
    </div>

    <div class="date-box">
      <label for="selectedDate">เลือกวันที่ย้อนหลัง:</label>
      <input type="date" id="selectedDate" />
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-title">อุณหภูมิปัจจุบัน / ล่าสุดของวันที่เลือก</div>
        <div id="temp" class="card-value">-- °C</div>
      </div>

      <div class="card">
        <div class="card-title">ความชื้นปัจจุบัน / ล่าสุดของวันที่เลือก</div>
        <div id="hum" class="card-value">-- %</div>
      </div>

      <div class="card">
        <div class="card-title">สถานะ</div>
        <div id="status" class="status-main">กำลังโหลด...</div>
        <div id="statusMessage" class="status-sub">-</div>
      </div>

      <div class="card">
        <div class="card-title">อัปเดตล่าสุด</div>
        <div id="updated" class="status-main">-</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">กราฟย้อนหลังอุณหภูมิ / ความชื้น ของวันที่เลือก</div>
      <div class="chart-wrap">
        <canvas id="historyChart"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">ตารางย้อนหลังของวันที่เลือก</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>เวลา</th>
              <th>อุณหภูมิ (°C)</th>
              <th>ความชื้น (%)</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            <tr>
              <td colspan="4">กำลังโหลด...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
